{{- if .Values.ingress.enabled }}
{{- /* The portal serves two fixed hosts; build them (and TLS) from the top-level
       portalHost/sandboxHost/tlsSecretName so hosts are declared once, not repeated. */}}
{{- $hosts := list (dict "host" .Values.portalHost "port" "portal") (dict "host" .Values.sandboxHost "port" "dev-portal") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "smartbox.fullname" . }}
  labels:
    {{- include "smartbox.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- with .Values.tlsSecretName }}
  tls:
    - hosts:
        {{- range $hosts }}
        - {{ .host | quote }}
        {{- end }}
      secretName: {{ . }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "smartbox.fullname" $ }}
                port:
                  name: {{ .port }}
    {{- end }}
{{- end }}
