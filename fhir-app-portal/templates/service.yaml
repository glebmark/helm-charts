apiVersion: v1
kind: Service
metadata:
  name: {{ include "smartbox.fullname" . }}
  labels:
    {{- include "smartbox.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.sessionAffinity }}
  sessionAffinity: {{ . }}
  {{- end }}
  {{- with .Values.service.sessionAffinityConfig }}
  sessionAffinityConfig:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    {{- include "smartbox.selectorLabels" . | nindent 4 }}
  # The backend port (8081) is intentionally not exposed by the Service.
  ports:
    - name: portal
      protocol: TCP
      port: 8095
      targetPort: 8095
    - name: dev-portal
      protocol: TCP
      port: 8096
      targetPort: 8096
