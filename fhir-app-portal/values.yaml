# =============================================================================
# fhir-app-portal — Smartbox portal (admin + developer)
# Single container, two HTTP ports: 8095 (admin) + 8096 (developer), 8081 backend.
# Connects to BOTH Aidboxes: admin (8095) and sandbox (8096).
# =============================================================================

nameOverride: ""
fullnameOverride: ""
replicaCount: 1

image:
  repository: healthsamurai/fhir-app-portal
  tag: ""
  digest: "" # if set, used instead of tag (repository@sha256:...)
  pullPolicy: Always

imagePullSecrets: [] # e.g. [ { name: artifact-registry-creds } ]

# Container ports are hardcoded in templates/deployment.yaml (fixed by the image).

probe:
  path: /health
  scheme: HTTP
  # startupProbe gates liveness/readiness until the app has booted
  # (here: up to failureThreshold*periodSeconds = 30*10 = 300s).
  startup:
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 30
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Deployment rollout + lifecycle
strategy:
  maxSurge: 1
  maxUnavailable: 0
terminationGracePeriodSeconds: 30

resources:
  requests:
    cpu: 10m
    memory: 256Mi
  limits:
    memory: 512Mi

securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop: [ "ALL" ]

podAnnotations: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}

# ----- non-secret config -> ConfigMap, mounted via envFrom -----
# In-cluster Aidbox service names assume admin/sandbox run in the same namespace
# with fullnameOverride aidbox-admin / aidbox-sandbox (service <name>-api).
config:
  NODE_ENV: production
  PORTAL_BACKEND_PORT: "8081"
  DEPLOYMENT_MODE: prod
  CORS_ORIGINS: "https://portal.example.com,https://portal-sandbox.example.com"
  ADMIN_FRONTEND_URL: "https://portal.example.com"
  DEVELOPER_FRONTEND_URL: "https://portal-sandbox.example.com"
  AIDBOX_ADMIN_URL: "http://aidbox-admin-api"
  AIDBOX_DEV_URL: "http://aidbox-sandbox-api"
  AIDBOX_ADMIN_PUBLIC_URL: "https://aidbox.example.com"
  ADMIN_AIDBOX_PUBLIC_URL: "https://aidbox.example.com"
  AIDBOX_DEV_PUBLIC_URL: "https://aidbox-sandbox.example.com"
  DEVELOPER_AIDBOX_PUBLIC_URL: "https://aidbox-sandbox.example.com"
  AIDBOX_ADMIN_CLIENT_ID: smartbox-admin-portal
  AIDBOX_DEV_CLIENT_ID: smartbox-developer-portal
  ADMIN_API_CLIENT_ID: admin-api
  DEVELOPER_API_CLIENT_ID: developer-api
  APP_NAME: "FHIR Access Portal"

# ----- secrets: existing Secret consumed via envFrom (chart does NOT create it) -----
secrets:
  # The chart does NOT create this Secret — provision it in your infra layer
  # (External Secrets Operator, sealed-secrets, etc.). See PREREQUISITES.md.
  # Defaults to "<release>-secrets" when empty.
  # Required keys: SESSION_SECRET, ADMIN_API_CLIENT_SECRET, DEVELOPER_API_CLIENT_SECRET
  existingSecretName: ""

service:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  # Service ports are hardcoded in templates/service.yaml (fixed by the image).

ingress:
  enabled: true
  # Routing API: "ingress" (default, nginx Ingress) or "gateway" (Gateway API HTTPRoute).
  api: ingress
  # Gateway API mode (api: gateway) — attaches HTTPRoutes to an EXISTING parent Gateway.
  # The chart does not create the Gateway. TLS + the nginx annotations below are
  # NOT applied in gateway mode (they belong on the parent Gateway / its policies).
  gateway:
    name: "" # REQUIRED in gateway mode: name of the parent Gateway
    namespace: "" # optional: parent Gateway namespace (defaults to release namespace)
    sectionName: "" # optional: specific Gateway listener section to attach to
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/upstream-vhost: "$host"
    nginx.ingress.kubernetes.io/preserve-host: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/enable-gzip: "true"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
  tls:
  - hosts:
    - portal.example.com
    - portal-sandbox.example.com
    secretName: fhir-portal-tls
  # servicePortName references a named port defined in templates/service.yaml.
  hosts:
  - { host: portal.example.com, servicePortName: portal }
  - { host: portal-sandbox.example.com, servicePortName: dev-portal }
