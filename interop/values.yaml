# =============================================================================
# interop — ePA interop service. ClusterIP-internal (no ingress).
# Connects to the ADMIN Aidbox only.
# =============================================================================

nameOverride: ""
fullnameOverride: ""
replicaCount: 1

image:
  repository: healthsamurai/interop
  tag: ""
  digest: ""
  pullPolicy: Always

imagePullSecrets: []

# Container ports are hardcoded in templates/deployment.yaml (fixed by the image).

probe:
  path: /health
  scheme: HTTP
  # startupProbe gates liveness/readiness until the app has booted
  # (here: up to failureThreshold*periodSeconds = 30*10 = 300s).
  startup:
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 30
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Deployment rollout + lifecycle
strategy:
  maxSurge: 1
  maxUnavailable: 0
terminationGracePeriodSeconds: 30

resources:
  requests:
    cpu: 10m
    memory: 256Mi
  limits:
    memory: 512Mi

securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop: [ "ALL" ]

podAnnotations: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}

# ----- non-secret config -> ConfigMap, mounted via envFrom -----
config:
  AIDBOX_URL: "http://aidbox-admin-api" # admin Aidbox, in-cluster
  AIDBOX_PUBLIC_URL: "https://aidbox.example.com"
  AIDBOX_CLIENT_ID: interop-app
  AIDBOX_APP_ID: interop-app
  AIDBOX_APP_PORT: "8088"
  INTEROP_APP_URL: "http://interop:8088/"

# ----- secrets -> envFrom -----
secrets:
  # The chart does NOT create this Secret — provision it in your infra layer.
  # See PREREQUISITES.md. Defaults to "<release>-secrets" when empty.
  # Required keys: AIDBOX_CLIENT_SECRET, AIDBOX_APP_SECRET (dedicated, not shared)
  existingSecretName: ""

service:
  type: ClusterIP
  sessionAffinity: null
  # Service ports are hardcoded in templates/service.yaml (fixed by the image).

ingress:
  enabled: false
  # Routing API: "ingress" (default, nginx Ingress) or "gateway" (Gateway API HTTPRoute).
  # In gateway mode, set gateway.name to an EXISTING parent Gateway and define hosts.
  api: ingress
  gateway:
    name: "" # REQUIRED in gateway mode: name of the parent Gateway
    namespace: "" # optional: parent Gateway namespace (defaults to release namespace)
    sectionName: "" # optional: specific Gateway listener section to attach to
