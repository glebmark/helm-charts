# =============================================================================
# interop — ePA interop service. ClusterIP-internal (no ingress).
# Connects to the ADMIN Aidbox only.
# =============================================================================

nameOverride: ""
fullnameOverride: ""
replicaCount: 1

image:
  repository: healthsamurai/interop
  tag: "2605"
  digest: ""
  pullPolicy: Always

imagePullSecrets: []

ports:
  - { name: http, containerPort: 8088 }

probe:
  path: /health
  port: 8088
  scheme: HTTP
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Deployment rollout + lifecycle
strategy:
  maxSurge: 1
  maxUnavailable: 0
terminationGracePeriodSeconds: 30

resources:
  requests:
    cpu: 10m
    memory: 256Mi
  limits:
    memory: 512Mi

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

podAnnotations: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}

# ----- non-secret config -> ConfigMap, mounted via envFrom -----
config:
  AIDBOX_URL: "http://aidbox-admin-api"        # admin Aidbox, in-cluster
  AIDBOX_PUBLIC_URL: "https://aidbox.example.com"
  AIDBOX_CLIENT_ID: interop-app
  AIDBOX_APP_ID: interop-app
  AIDBOX_APP_PORT: "8088"
  INTEROP_APP_URL: "http://interop:8088/"

# ----- secrets -> envFrom -----
secrets:
  # The chart does NOT create this Secret — provision it in your infra layer.
  # See PREREQUISITES.md. Defaults to "<release>-secrets" when empty.
  # Required keys: AIDBOX_CLIENT_SECRET, AIDBOX_APP_SECRET (dedicated, not shared)
  existingSecretName: ""

service:
  type: ClusterIP
  sessionAffinity: null
  ports:
    - { name: http, port: 8088, targetPort: 8088 }

ingress:
  enabled: false
