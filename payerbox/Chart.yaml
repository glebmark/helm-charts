apiVersion: v2
name: payerbox
description: >-
  Umbrella chart for the Smartbox payor + ePA stack — fhir-app-portal, interop, prior-auth and two Aidbox instances (admin + sandbox) backed by CloudNativePG.
type: application
version: 0.1.0
appVersion: "2605"
home: https://www.health-samurai.io
maintainers:
- name: Health Samurai

dependencies:
- name: aidbox
  alias: aidbox-admin
  version: 0.2.11
  repository: https://healthsamurai.github.io/helm-charts
  condition: aidbox-admin.enabled
- name: aidbox
  alias: aidbox-sandbox
  version: 0.2.11
  repository: https://healthsamurai.github.io/helm-charts
  condition: aidbox-sandbox.enabled
- name: fhir-app-portal
  version: 0.1.0
  repository: file://../fhir-app-portal
  condition: fhir-app-portal.enabled
- name: interop
  version: 0.1.0
  repository: file://../interop
  condition: interop.enabled
- name: prior-auth
  version: 0.1.0
  repository: file://../prior-auth
  condition: prior-auth.enabled
