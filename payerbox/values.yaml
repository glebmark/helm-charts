# payerbox — umbrella for the Smartbox payor + ePA stack (fhir-app-portal, interop,
# prior-auth, + admin & sandbox Aidbox), all in the release namespace.
# Does NOT create PostgreSQL or Secrets — provision them first (CNPG, External Secrets,
# ingress-nginx, cert-manager) and reference the existing DB service + Secrets. See PREREQUISITES.md.

# Aidbox ADMIN (production data) — fullnameOverride aidbox-admin -> service aidbox-admin-api
aidbox-admin:
  enabled: true
  fullnameOverride: aidbox-admin
  protocol: https
  host: aidbox.example.com
  image:
    tag: "2605"
  config:
    BOX_ID: aidbox-admin
    BOX_INSTANCE_NAME: aidbox-admin
    BOX_DB_HOST: payerbox-db-rw
    BOX_DB_PORT: 5432
    BOX_DB_DATABASE: portal
    BOX_FHIR_COMPLIANT_MODE: true
    BOX_FHIR_SCHEMA_VALIDATION: true
    BOX_SECURITY_AUDIT_LOG_ENABLED: true
    BOX_SETTINGS_MODE: read-write
    BOX_INIT_BUNDLE: file:///init-bundle/init-bundle.json
    JAVA_OPTS: "-XX:MaxRAMPercentage=75"
  # Secret env (DB creds, license, admin pwd, client secrets) from the infra-provisioned
  # aidbox-admin-env Secret (appended after .config, so it wins). Keep secrets OUT of .config.
  extraEnvFromSecrets:
    - aidbox-admin-env
  volumes:
    - name: init-bundle
      configMap:
        name: aidbox-admin-init-bundle
  volumeMounts:
    - name: init-bundle
      mountPath: /init-bundle
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
  serviceMonitor:
    enabled: false
  resources:
    requests: { cpu: 500m, memory: 2Gi }
    limits: { memory: 2Gi }

# Aidbox SANDBOX (developer/test data) — fullnameOverride aidbox-sandbox -> service aidbox-sandbox-api
aidbox-sandbox:
  enabled: true
  fullnameOverride: aidbox-sandbox
  protocol: https
  host: aidbox-sandbox.example.com
  image:
    tag: "2605"
  config:
    BOX_ID: aidbox-sandbox
    BOX_INSTANCE_NAME: aidbox-sandbox
    BOX_DB_HOST: payerbox-db-rw
    BOX_DB_PORT: 5432
    BOX_DB_DATABASE: sandbox
    BOX_FHIR_COMPLIANT_MODE: true
    BOX_FHIR_SCHEMA_VALIDATION: true
    BOX_SETTINGS_MODE: read-write
    BOX_INIT_BUNDLE: file:///init-bundle/init-bundle.json
    JAVA_OPTS: "-XX:MaxRAMPercentage=75"
  extraEnvFromSecrets:
    - aidbox-sandbox-env
  volumes:
    - name: init-bundle
      configMap:
        name: aidbox-sandbox-init-bundle
  volumeMounts:
    - name: init-bundle
      mountPath: /init-bundle
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
  serviceMonitor:
    enabled: false
  resources:
    requests: { cpu: 250m, memory: 1Gi }
    limits: { memory: 2Gi }

# App subcharts — values here override each app chart's defaults.
fhir-app-portal:
  enabled: true
  config:
    CORS_ORIGINS: "https://portal.example.com,https://portal-sandbox.example.com"
    ADMIN_FRONTEND_URL: "https://portal.example.com"
    DEVELOPER_FRONTEND_URL: "https://portal-sandbox.example.com"
    AIDBOX_ADMIN_URL: "http://aidbox-admin-api"
    AIDBOX_DEV_URL: "http://aidbox-sandbox-api"
    AIDBOX_ADMIN_PUBLIC_URL: "https://aidbox.example.com"
    ADMIN_AIDBOX_PUBLIC_URL: "https://aidbox.example.com"
    AIDBOX_DEV_PUBLIC_URL: "https://aidbox-sandbox.example.com"
    DEVELOPER_AIDBOX_PUBLIC_URL: "https://aidbox-sandbox.example.com"

interop:
  enabled: true
  config:
    AIDBOX_URL: "http://aidbox-admin-api"
    AIDBOX_PUBLIC_URL: "https://aidbox.example.com"

prior-auth:
  enabled: true
  config:
    AIDBOX_URL: "http://aidbox-admin-api"
